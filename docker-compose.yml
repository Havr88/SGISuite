services:
  web:
    build: .
    container_name: sgi_app
    restart: always
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=sgi-super-secret-key-change-me
      - DATABASE_URL=postgresql://sgi_user:sgi_password@db:5432/sgi_db
      - CACHE_TYPE=RedisCache
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    ports:
      - "5000:5000"

  db:
    image: postgres:15-alpine
    container_name: sgi_db
    restart: always
    environment:
      - POSTGRES_USER=sgi_user
      - POSTGRES_PASSWORD=sgi_password
      - POSTGRES_DB=sgi_db
    volumes:
      - sgi_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sgi_redis
    restart: always
    volumes:
      - sgi_redisdata:/data

volumes:
  sgi_pgdata:
  sgi_redisdata:
